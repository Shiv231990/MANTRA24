{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mantra24 • Premium Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm premium-navbar">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold brand-logo" href="/api/products/">
            🌿 Mantra24
        </a>

        <!-- Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Search -->
            <form class="d-flex mx-lg-auto w-100 w-lg-50" action="/api/products/" method="get">
                <input class="form-control me-2 premium-input"
                       type="search"
                       name="q"
                       placeholder="Search products..."
                       value="{{ request.GET.q }}">
                <button class="btn btn-success premium-btn" type="submit">Search</button>
            </form>

            <!-- Right Menu -->
            <ul class="navbar-nav ms-lg-auto align-items-lg-center">

                <!-- Cart -->
                <li class="nav-item me-lg-3">
                    <a href="/api/cart/" class="btn btn-outline-light btn-sm">
                        🛒 Cart
                    </a>
                </li>

                {% if user.is_authenticated %}

                <li class="nav-item">
                    <span class="nav-link text-light">
                        Hi, {{ user.username }}
                    </span>
                </li>

                <li class="nav-item">
                    <a href="/api/accounts/profile/" class="nav-link">
                        👤 Account
                    </a>
                </li>

                <li class="nav-item ms-lg-2">
                    <form action="/api/accounts/logout/" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                </li>

                {% else %}

                <li class="nav-item">
                    <a href="/api/accounts/login/" class="btn btn-success btn-sm">Login</a>
                </li>

                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<!-- ================= MAIN CONTENT ================= -->
<main class="container py-4">
    {% block content %}
    {% endblock %}
</main>

<!-- ================= FOOTER ================= -->
<footer class="text-center py-4 mt-5 border-top" style="border-color: rgba(16,185,129,0.2) !important;">
    <small class="text-muted">
        © 2026 Mantra24 • Premium Store
    </small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
